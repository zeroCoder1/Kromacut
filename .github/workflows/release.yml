name: Release Native App

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            matrix:
                include:
                    - platform: 'macos-latest'
                      args: '--target aarch64-apple-darwin'
                    - platform: 'macos-latest'
                      args: '--target x86_64-apple-darwin'
                    - platform: 'ubuntu-22.04'
                      args: ''
                    - platform: 'windows-latest'
                      args: ''

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin,x86_64-apple-darwin

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install dependencies
              run: npm ci

            - name: Build
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Kromacut ${{ github.ref_name }}'
                  releaseBody: ''
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

    release:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Publish release
              uses: actions/github-script@v7
              with:
                  script: |
                      const releases = await github.rest.repos.listReleases({
                          owner: context.repo.owner,
                          repo: context.repo.repo
                      });
                      const draftRelease = releases.data.find(r => r.draft && r.tag_name === context.ref.replace('refs/tags/', ''));
                      if (draftRelease) {
                          await github.rest.repos.updateRelease({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              release_id: draftRelease.id,
                              draft: false,
                              body: `## What's New

Download the native application for your platform with better performance than the web version.

### Installation

**macOS:**
1. Download the \`.dmg\` file for your Mac:
   - **Apple Silicon (M1/M2/M3)**: \`*_aarch64.dmg\`
   - **Intel**: \`*_x86_64.dmg\`
2. Open the DMG and drag Kromacut to Applications
3. Remove quarantine (required for unsigned apps):
   \`\`\`bash
   sudo xattr -d com.apple.quarantine /Applications/Kromacut.app
   \`\`\`
4. Launch from Applications

**Windows:**
1. Download the \`.msi\` installer
2. Run the installer and follow the prompts
3. Launch Kromacut from the Start menu

**Linux:**
1. Download the \`.AppImage\` or \`.deb\` file
2. For AppImage: \`chmod +x Kromacut*.AppImage && ./Kromacut*.AppImage\`
3. For Debian/Ubuntu: \`sudo dpkg -i kromacut*.deb\`

### Features
- Native performance with better GPU acceleration
- Lower memory usage than web version
- Faster image processing
- Offline usage`
                          });
                      }
