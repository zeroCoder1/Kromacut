name: Release Native App

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            matrix:
                include:
                    - platform: 'macos-latest'
                      args: '--target aarch64-apple-darwin'
                    - platform: 'macos-latest'
                      args: '--target x86_64-apple-darwin'
                    - platform: 'ubuntu-22.04'
                      args: ''
                    - platform: 'windows-latest'
                      args: ''

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin,x86_64-apple-darwin

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install dependencies
              run: npm ci

            - name: Build
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Kromacut ${{ github.ref_name }}'
                  releaseBody: ''
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

    release:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Publish release
              uses: actions/github-script@v7
              with:
                  script: |
                      const releases = await github.rest.repos.listReleases({
                          owner: context.repo.owner,
                          repo: context.repo.repo
                      });
                      const tagName = context.ref.replace('refs/tags/', '');
                      const draftRelease = releases.data.find(r => r.draft && r.tag_name === tagName);
                      if (draftRelease) {
                          await github.rest.repos.updateRelease({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              release_id: draftRelease.id,
                              draft: false,
                              body: '## Installation\n\n**macOS:**\n1. Download the .dmg file for your Mac:\n   - Apple Silicon (M1/M2/M3): *_aarch64.dmg\n   - Intel: *_x86_64.dmg\n2. Open the DMG and drag Kromacut to Applications\n3. Remove quarantine (required for unsigned apps):\n   sudo xattr -d com.apple.quarantine /Applications/Kromacut.app\n4. Launch from Applications\n\n**Windows:**\n1. Download the .msi installer\n2. Run the installer and follow the prompts\n3. Launch Kromacut from the Start menu\n\n**Linux:**\n1. Download the .AppImage or .deb file\n2. For AppImage: chmod +x Kromacut*.AppImage && ./Kromacut*.AppImage\n3. For Debian/Ubuntu: sudo dpkg -i kromacut*.deb\n\n## Features\n- Native performance with better GPU acceleration\n- Lower memory usage than web version\n- Faster image processing\n- Offline usage'
                          });
                      }
